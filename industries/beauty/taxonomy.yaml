topics:
  - name: Treatment Quality
    description: Effectiveness, results, and technique quality of aesthetic treatments (facial, body, hair removal, etc.)
    label_es: Calidad de tratamientos

  - name: Staff & Professionals
    description: Professionalism, expertise, attitude, and communication of aestheticians and beauticians
    label_es: Personal y profesionales

  - name: Cleanliness & Hygiene
    description: Cleanliness of facilities, sterilization of tools, use of disposable materials, general hygiene standards
    label_es: Limpieza e higiene

  - name: Products & Materials
    description: Quality and brand of products used in treatments; whether products cause reactions or feel premium
    label_es: Productos y materiales

  - name: Price & Value
    description: Pricing, perceived value for money, promotions, packages, and transparency in billing
    label_es: Precio y valor

  - name: Appointment & Scheduling
    description: Ease of booking, punctuality, waiting times, cancellation handling, and appointment reminders
    label_es: Turnos y puntualidad

  - name: Facilities & Ambiance
    description: Decor, comfort, music, lighting, temperature, and overall atmosphere of the space
    label_es: Instalaciones y ambiente

  - name: Location & Access
    description: Parking, public transport access, opening hours, and neighborhood
    label_es: Ubicación y acceso

  - name: Results & Effectiveness
    description: Long-term or visible results after treatments; before/after outcomes explicitly mentioned
    label_es: Resultados y efectividad

  - name: Overall Experience
    description: Holistic impression when no single area dominates the review
    label_es: Experiencia general
