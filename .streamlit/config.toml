[theme]
primaryColor = "#0E1116"
backgroundColor = "#F5F1E8"
secondaryBackgroundColor = "#ECE6D4"
# Without this, Streamlit mixes backgroundColor + secondaryBackgroundColor for
# the dataframe header — and the mix of two warm-light tones reads as near-white,
# breaking the cream/beige palette. Pin it to BEIGE so the header matches the
# sidebar background.
dataframeHeaderBackgroundColor = "#ECE6D4"
textColor = "#0E1116"
font = "sans serif"
